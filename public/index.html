<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 200px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
			}

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
			}

			#send-button {
				margin-left: 0.5rem;
				padding: 0 1rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				transition: background-color 0.2s;
			}

			#send-button:hover {
				background-color: var(--primary-hover);
			}

			#send-button:disabled {
				background-color: var(--text-light);
				cursor: not-allowed;
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 1rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}

			.header-content {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 2rem;
				flex-wrap: wrap;
			}

			.header-info {
				display: flex;
				flex-direction: column;
				align-items: center;
			}

			.header-info h1 {
				margin-bottom: 0.25rem;
			}

			.header-info p {
				font-size: 0.9rem;
				color: var(--text-light);
				margin: 0;
			}

			.model-selector-group {
				display: flex;
				align-items: center;
				gap: 0.75rem;
			}

			.model-selector-group label {
				font-weight: 500;
				color: var(--text-color);
				font-size: 0.95rem;
			}

			#model-selector {
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				font-size: 0.9rem;
				color: var(--text-color);
				background-color: white;
				cursor: pointer;
				transition: all 0.2s;
				min-width: 200px;
			}

			#model-selector:hover {
				border-color: var(--primary-color);
				box-shadow: 0 2px 4px rgba(246, 130, 31, 0.1);
			}

			#model-selector:focus {
				outline: none;
				border-color: var(--primary-color);
				box-shadow: 0 0 0 3px rgba(246, 130, 31, 0.1);
			}
		</style>
	</head>
	<body>
		<header>
			<div class="header-content">
				<div class="header-info">
					<h1>Cloudflare AI Chat</h1>
					<p>Powered by Cloudflare Workers AI and <s>Daniel Suen</s></p>
				</div>
				<div class="model-selector-group">
					<label for="model-selector">Model:</label>
					<select id="model-selector">
						<option value="@cf/meta/llama-3.1-8b-instruct-fp8">Llama 3.1 8B</option>
						<option value="@cf/google/gemma-2b-it-lora">Gemma 2B</option>
						<!-- <option value="@cf/openchat/openchat-3.5">OpenChat 3.5</option> -->
					</select>
				</div>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<!-- <div class="message assistant-message">
					<p>
						你好！我係一個LLM聊天應用程式。今日有咩可以幫到你？
					</p>
				</div> -->
			</div>

			<div class="typing-indicator" id="typing-indicator">
				幫緊你...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Type your message here..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat &copy; 2026</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
